<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Activity — Autonomous Coding Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <style>
    .live-container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
    .live-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .live-header h1 { font-size: 1.75rem; font-weight: 700; color: var(--color-text); display: flex; align-items: center; gap: 0.5rem; }
    .live-indicator { display: inline-flex; align-items: center; gap: 0.4rem; font-size: 0.8rem; font-weight: 600; padding: 0.25rem 0.75rem; border-radius: 999px; }
    .live-indicator.connected { background: rgba(34,197,94,0.15); color: #22c55e; }
    .live-indicator.disconnected { background: rgba(239,68,68,0.15); color: #ef4444; }
    .live-indicator .pulse { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .live-indicator.connected .pulse { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    .live-controls { display: flex; gap: 0.75rem; align-items: center; }
    .feed-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: 10px; padding: 1rem 1.25rem; }
    .stat-card .label { font-size: 0.75rem; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
    .stat-card .value { font-size: 1.5rem; font-weight: 700; color: var(--color-text); font-family: 'JetBrains Mono', monospace; }
    .feed-wrapper { background: var(--color-bg-secondary); border: 1px solid var(--color-border); border-radius: 12px; overflow: hidden; }
    .feed-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1rem; border-bottom: 1px solid var(--color-border); }
    .feed-toolbar select { background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 6px; padding: 0.3rem 0.6rem; color: var(--color-text); font-size: 0.8rem; }
    .feed { height: 560px; overflow-y: auto; padding: 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; }
    .feed-row { display: grid; grid-template-columns: 130px 110px 1fr 90px; gap: 0.75rem; align-items: center; padding: 0.45rem 0.75rem; border-radius: 7px; font-size: 0.82rem; transition: background 0.15s; }
    .feed-row:hover { background: var(--color-bg); }
    .feed-row .ts { font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--color-text-secondary); }
    .agent-pill { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .agent-acd { background: rgba(99,102,241,0.15); color: #818cf8; }
    .agent-claude { background: rgba(251,191,36,0.15); color: #f59e0b; }
    .agent-harness { background: rgba(34,197,94,0.15); color: #22c55e; }
    .agent-worker { background: rgba(239,68,68,0.15); color: #f87171; }
    .agent-queue { background: rgba(14,165,233,0.15); color: #38bdf8; }
    .action-text { color: var(--color-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .status-icon { text-align: right; font-size: 0.8rem; }
    .status-running { color: #f59e0b; }
    .status-done { color: #22c55e; }
    .status-error { color: #ef4444; }
    .status-info { color: var(--color-text-secondary); }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--color-text-secondary); gap: 0.5rem; }
    .empty-state .icon { font-size: 2.5rem; }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">🤖</div>
          <span>Autonomous Coding Agent</span>
        </a>
        <div style="display:flex;gap:1rem;align-items:center;">
          <a href="index.html" class="btn btn-secondary">📊 Dashboard</a>
          <a href="queue.html" class="btn btn-secondary">📋 Queue</a>
          <a href="control.html" class="btn btn-secondary">🎮 Control</a>
          <a href="live.html" class="btn">📡 Live</a>
          <a href="autonomous.html" class="btn btn-secondary">⚡ Autonomous</a>
        </div>
      </div>
    </div>
  </header>

  <main class="live-container">
    <div class="live-header">
      <h1>📡 Live Activity Feed
        <span class="live-indicator disconnected" id="live-badge">
          <span class="pulse"></span>
          <span id="live-label">Connecting...</span>
        </span>
      </h1>
      <div class="live-controls">
        <button class="btn btn-secondary" onclick="clearFeed()">🗑 Clear</button>
        <button class="btn btn-secondary" onclick="togglePause()" id="pause-btn">⏸ Pause</button>
        <button class="btn" onclick="reconnect()">🔄 Reconnect</button>
      </div>
    </div>

    <div class="feed-stats">
      <div class="stat-card"><div class="label">Total Events</div><div class="value" id="stat-total">0</div></div>
      <div class="stat-card"><div class="label">Connected Clients</div><div class="value" id="stat-clients">—</div></div>
      <div class="stat-card"><div class="label">Errors</div><div class="value" id="stat-errors">0</div></div>
      <div class="stat-card"><div class="label">Last Event</div><div class="value" style="font-size:0.9rem;" id="stat-last">—</div></div>
    </div>

    <div class="feed-wrapper">
      <div class="feed-toolbar">
        <div style="font-size:0.8rem;color:var(--color-text-secondary);">Showing last <strong id="feed-count">0</strong> / 100 events</div>
        <div style="display:flex;gap:0.75rem;align-items:center;">
          <label style="font-size:0.8rem;color:var(--color-text-secondary);">Filter:</label>
          <select id="agent-filter" onchange="applyFilter()">
            <option value="">All agents</option>
            <option value="acd">acd</option>
            <option value="claude">claude</option>
            <option value="harness">harness</option>
            <option value="worker">worker</option>
            <option value="queue">queue</option>
          </select>
          <select id="status-filter" onchange="applyFilter()">
            <option value="">All statuses</option>
            <option value="running">running</option>
            <option value="done">done</option>
            <option value="error">error</option>
            <option value="info">info</option>
          </select>
          <label style="font-size:0.8rem;color:var(--color-text-secondary);">
            <input type="checkbox" id="auto-scroll" checked> Auto-scroll
          </label>
        </div>
      </div>
      <div class="feed" id="feed">
        <div class="empty-state">
          <span class="icon">📡</span>
          <span>Waiting for activity events...</span>
          <span style="font-size:0.75rem;">Events stream from acd-mcp-server on port 3201</span>
        </div>
      </div>
    </div>
  </main>

  <script>
    const ACTIVITY_URL = 'http://127.0.0.1:3201';
    let eventSource = null;
    let paused = false;
    let allEvents = [];
    let totalCount = 0;
    let errorCount = 0;

    const agentColors = {
      acd: 'agent-acd', claude: 'agent-claude', harness: 'agent-harness',
      worker: 'agent-worker', queue: 'agent-queue'
    };

    function agentClass(agent) {
      const key = (agent || '').split('-')[0].toLowerCase();
      return agentColors[key] || 'agent-acd';
    }

    function statusClass(status) {
      const map = { running: 'status-running', done: 'status-done', error: 'status-error', info: 'status-info' };
      return map[status] || 'status-info';
    }

    function statusIcon(status) {
      const map = { running: '⟳', done: '✓', error: '✗', info: '•' };
      return map[status] || '•';
    }

    function formatTs(ts) {
      try {
        const d = new Date(ts);
        return d.toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
      } catch { return ts || ''; }
    }

    function applyFilter() {
      const agentF = document.getElementById('agent-filter').value;
      const statusF = document.getElementById('status-filter').value;
      const visible = allEvents.filter(e =>
        (!agentF || (e.agent || '').includes(agentF)) &&
        (!statusF || e.status === statusF)
      ).slice(-100);
      renderFeed(visible);
    }

    function renderFeed(events) {
      const feed = document.getElementById('feed');
      if (events.length === 0) {
        feed.innerHTML = '<div class="empty-state"><span class="icon">📡</span><span>No events match filter</span></div>';
        document.getElementById('feed-count').textContent = '0';
        return;
      }
      feed.innerHTML = events.map(e => `
        <div class="feed-row">
          <span class="ts">${formatTs(e.timestamp)}</span>
          <span class="agent-pill ${agentClass(e.agent)}">${e.agent || 'acd'}</span>
          <span class="action-text" title="${(e.action || '') + (e.detail ? ' — ' + e.detail : '')}">${e.action || ''}${e.detail ? ' <span style="color:var(--color-text-secondary)">— ' + e.detail + '</span>' : ''}</span>
          <span class="status-icon ${statusClass(e.status)}">${statusIcon(e.status)} ${e.status || 'info'}</span>
        </div>
      `).join('');
      document.getElementById('feed-count').textContent = events.length;
      const autoScroll = document.getElementById('auto-scroll').checked;
      if (autoScroll) feed.scrollTop = feed.scrollHeight;
    }

    function addEvent(event) {
      if (event.type === 'connected') return;
      allEvents.push(event);
      if (allEvents.length > 200) allEvents.shift();
      totalCount++;
      if (event.status === 'error') errorCount++;
      document.getElementById('stat-total').textContent = totalCount;
      document.getElementById('stat-errors').textContent = errorCount;
      document.getElementById('stat-last').textContent = formatTs(event.timestamp);
      if (!paused) applyFilter();
    }

    function connect() {
      if (eventSource) eventSource.close();
      setBadge(false, 'Connecting...');
      eventSource = new EventSource(`${ACTIVITY_URL}/api/activity-stream`);
      eventSource.onopen = () => setBadge(true, 'Live');
      eventSource.onmessage = (e) => {
        try { addEvent(JSON.parse(e.data)); } catch {}
      };
      eventSource.onerror = () => {
        setBadge(false, 'Reconnecting...');
        setTimeout(connect, 4000);
      };
      // Also fetch backlog
      fetch(`${ACTIVITY_URL}/api/activity-log`)
        .then(r => r.json())
        .then(events => { events.forEach(addEvent); })
        .catch(() => {});
    }

    function setBadge(connected, label) {
      const badge = document.getElementById('live-badge');
      badge.className = 'live-indicator ' + (connected ? 'connected' : 'disconnected');
      document.getElementById('live-label').textContent = label;
    }

    function reconnect() { allEvents = []; totalCount = 0; errorCount = 0; connect(); }
    function clearFeed() { allEvents = []; applyFilter(); }
    function togglePause() {
      paused = !paused;
      document.getElementById('pause-btn').textContent = paused ? '▶ Resume' : '⏸ Pause';
      if (!paused) applyFilter();
    }

    connect();
  </script>
</body>
</html>
