<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRD Library - ACD Dashboard</title>
  <link rel="stylesheet" href="index.css">
  <style>
    .prd-library-container {
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .prd-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .prd-filters {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .prd-table {
      width: 100%;
      background: var(--card-bg);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .prd-table table {
      width: 100%;
      border-collapse: collapse;
    }

    .prd-table th {
      background: var(--primary-color);
      color: white;
      padding: 1rem;
      text-align: left;
      font-weight: 600;
    }

    .prd-table td {
      padding: 1rem;
      border-bottom: 1px solid var(--border-color);
    }

    .prd-table tr:hover {
      background: var(--hover-bg);
    }

    .domain-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .domain-coding { background: #e3f2fd; color: #1976d2; }
    .domain-acquisition { background: #f3e5f5; color: #7b1fa2; }
    .domain-content { background: #e8f5e9; color: #388e3c; }
    .domain-research { background: #fff3e0; color: #f57c00; }
    .domain-mcp { background: #fce4ec; color: #c2185b; }
    .domain-skill { background: #e0f2f1; color: #00796b; }

    .launch-drawer {
      position: fixed;
      right: -500px;
      top: 0;
      width: 500px;
      height: 100vh;
      background: var(--card-bg);
      box-shadow: -4px 0 12px rgba(0,0,0,0.15);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
    }

    .launch-drawer.open {
      right: 0;
    }

    .drawer-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      display: none;
      z-index: 999;
    }

    .drawer-overlay.visible {
      display: block;
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }

    .drawer-content {
      padding: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    .form-group select,
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background: var(--bg-color);
      color: var(--text-color);
    }

    .form-group textarea {
      min-height: 150px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
    }

    .radio-group {
      display: flex;
      gap: 1rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .progress-bar {
      width: 100%;
      height: 4px;
      background: var(--border-color);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary-color);
      transition: width 0.3s ease;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="container">
      <div class="header-content">
        <a href="index.html" class="logo">
          <div class="logo-icon">🤖</div>
          <span>PRD Library</span>
        </a>
        <div style="display: flex; gap: 1rem;">
          <button id="launch-job-btn" class="btn">➕ Launch Job</button>
          <a href="index.html" class="btn btn-secondary">📊 Dashboard</a>
        </div>
      </div>
    </div>
  </header>

  <main class="prd-library-container">
    <div class="prd-header">
      <h1>PRD Library</h1>
      <div style="color: var(--text-secondary);">
        <span id="prd-count">0</span> PRDs available
      </div>
    </div>

    <div class="prd-filters">
      <select id="domain-filter" onchange="filterPRDs()">
        <option value="">All Domains</option>
        <option value="coding">Coding</option>
        <option value="acquisition">Acquisition</option>
        <option value="content">Content</option>
        <option value="research">Research</option>
        <option value="mcp">MCP</option>
        <option value="skill">Skill</option>
      </select>
      <input type="text" id="search-input" placeholder="Search PRDs..." onkeyup="filterPRDs()"
             style="flex: 1; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px;">
    </div>

    <div class="prd-table">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Domain</th>
            <th>Features</th>
            <th>Last Run</th>
            <th>Pass Rate</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="prds-table-body">
          <!-- Rows will be inserted here -->
        </tbody>
      </table>
    </div>
  </main>

  <!-- Launch Job Drawer -->
  <div class="drawer-overlay" id="drawer-overlay" onclick="closeLaunchDrawer()"></div>
  <div class="launch-drawer" id="launch-drawer">
    <div class="drawer-header">
      <h2>Launch Job</h2>
      <button onclick="closeLaunchDrawer()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">×</button>
    </div>
    <div class="drawer-content">
      <form id="launch-form" onsubmit="handleLaunch(event)">
        <div class="form-group">
          <label>PRD Source</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="prd-select" name="prd-source" value="select" checked onchange="togglePRDSource()">
              <label for="prd-select">Select Existing</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="prd-paste" name="prd-source" value="paste" onchange="togglePRDSource()">
              <label for="prd-paste">Paste Content</label>
            </div>
          </div>
        </div>

        <div class="form-group" id="prd-select-group">
          <label for="prd-dropdown">Select PRD</label>
          <select id="prd-dropdown" required>
            <option value="">-- Choose a PRD --</option>
          </select>
        </div>

        <div class="form-group" id="prd-paste-group" style="display: none;">
          <label for="prd-content">PRD Content</label>
          <textarea id="prd-content" placeholder="Paste PRD markdown content here..."></textarea>
        </div>

        <div class="form-group">
          <label for="target-repo">Target Repository</label>
          <input type="text" id="target-repo" placeholder="/absolute/path/to/repo" required
                 list="repos-list">
          <datalist id="repos-list"></datalist>
        </div>

        <div class="form-group">
          <label>Model</label>
          <div class="radio-group">
            <div class="radio-option">
              <input type="radio" id="model-haiku" name="model" value="claude-haiku-4-5-20251001">
              <label for="model-haiku">Haiku</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="model-sonnet" name="model" value="claude-sonnet-4-6" checked>
              <label for="model-sonnet">Sonnet</label>
            </div>
            <div class="radio-option">
              <input type="radio" id="model-opus" name="model" value="claude-opus-4-6">
              <label for="model-opus">Opus</label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <button type="button" class="btn btn-secondary" onclick="generateFeatures()" style="width: 100%;">
            Generate Features
          </button>
          <div id="features-preview" style="margin-top: 1rem; display: none;">
            <div style="font-weight: 500; margin-bottom: 0.5rem;">Generated Features: <span id="feature-count">0</span></div>
            <div style="max-height: 150px; overflow-y: auto; padding: 0.5rem; background: var(--bg-color); border-radius: 4px; font-size: 0.875rem;">
              <ul id="features-list" style="margin: 0; padding-left: 1.5rem;"></ul>
            </div>
          </div>
        </div>

        <div class="form-group">
          <button type="submit" class="btn" style="width: 100%;" id="launch-btn" disabled>
            Launch
          </button>
        </div>
      </form>
    </div>
  </div>

  <script>
    let allPRDs = [];
    let generatedFeatures = null;

    // Load PRDs on page load
    async function loadPRDs() {
      try {
        const response = await fetch('/api/prds');
        const data = await response.json();
        allPRDs = data.data || [];
        renderPRDs();
        populatePRDDropdown();
        document.getElementById('prd-count').textContent = allPRDs.length;
      } catch (error) {
        console.error('Failed to load PRDs:', error);
      }
    }

    // Load repos
    async function loadRepos() {
      try {
        const response = await fetch('/api/repos');
        const data = await response.json();
        const repos = data.data || [];
        const datalist = document.getElementById('repos-list');
        datalist.innerHTML = repos.map(repo => `<option value="${repo}">`).join('');
      } catch (error) {
        console.error('Failed to load repos:', error);
      }
    }

    function populatePRDDropdown() {
      const dropdown = document.getElementById('prd-dropdown');
      dropdown.innerHTML = '<option value="">-- Choose a PRD --</option>' +
        allPRDs.map(prd => `<option value="${prd.slug}">${prd.slug} ${prd.domain ? '(' + prd.domain + ')' : ''}</option>`).join('');
    }

    function renderPRDs() {
      const tbody = document.getElementById('prds-table-body');
      const domain = document.getElementById('domain-filter').value;
      const search = document.getElementById('search-input').value.toLowerCase();

      let filtered = allPRDs;
      if (domain) filtered = filtered.filter(p => p.domain === domain);
      if (search) filtered = filtered.filter(p => p.slug.toLowerCase().includes(search));

      tbody.innerHTML = filtered.map(prd => `
        <tr>
          <td><strong>${prd.slug}</strong></td>
          <td>${prd.domain ? `<span class="domain-badge domain-${prd.domain}">${prd.domain}</span>` : '-'}</td>
          <td>-</td>
          <td>-</td>
          <td>-</td>
          <td>
            <button class="btn btn-secondary" style="font-size: 0.875rem; padding: 0.5rem 1rem;"
                    onclick="launchFromPRD('${prd.slug}')">Launch</button>
          </td>
        </tr>
      `).join('');
    }

    function filterPRDs() {
      renderPRDs();
    }

    function openLaunchDrawer() {
      document.getElementById('launch-drawer').classList.add('open');
      document.getElementById('drawer-overlay').classList.add('visible');
    }

    function closeLaunchDrawer() {
      document.getElementById('launch-drawer').classList.remove('open');
      document.getElementById('drawer-overlay').classList.remove('visible');
    }

    function launchFromPRD(slug) {
      document.getElementById('prd-dropdown').value = slug;
      openLaunchDrawer();
    }

    function togglePRDSource() {
      const source = document.querySelector('input[name="prd-source"]:checked').value;
      document.getElementById('prd-select-group').style.display = source === 'select' ? 'block' : 'none';
      document.getElementById('prd-paste-group').style.display = source === 'paste' ? 'block' : 'none';
    }

    async function generateFeatures() {
      const source = document.querySelector('input[name="prd-source"]:checked').value;
      const slug = source === 'select' ? document.getElementById('prd-dropdown').value :
                   'custom-' + Date.now();
      const prdContent = source === 'paste' ? document.getElementById('prd-content').value : null;
      const targetPath = document.getElementById('target-repo').value;

      if (!targetPath) {
        alert('Please enter target repository path');
        return;
      }

      if (source === 'select' && !slug) {
        alert('Please select a PRD');
        return;
      }

      if (source === 'paste' && !prdContent) {
        alert('Please paste PRD content');
        return;
      }

      try {
        const response = await fetch('/api/dispatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slug,
            targetPath,
            prdContent: source === 'paste' ? prdContent : undefined,
            generateOnly: true
          })
        });

        const result = await response.json();
        if (response.ok) {
          generatedFeatures = result.data;
          document.getElementById('feature-count').textContent = result.data.featuresGenerated;
          document.getElementById('features-preview').style.display = 'block';
          document.getElementById('launch-btn').disabled = false;

          // Load and display features
          const featuresResp = await fetch(result.data.featureListPath.replace(/^.*harness/, '/harness'));
          const featuresData = await featuresResp.json();
          const list = document.getElementById('features-list');
          list.innerHTML = featuresData.features.map(f =>
            `<li>${f.id}: ${f.name} (${f.category}, p${f.priority})</li>`
          ).join('');
        } else {
          alert('Failed to generate features: ' + (result.error?.message || 'Unknown error'));
        }
      } catch (error) {
        alert('Error generating features: ' + error.message);
      }
    }

    async function handleLaunch(event) {
      event.preventDefault();

      const source = document.querySelector('input[name="prd-source"]:checked').value;
      const slug = source === 'select' ? document.getElementById('prd-dropdown').value :
                   'custom-' + Date.now();
      const prdContent = source === 'paste' ? document.getElementById('prd-content').value : null;
      const targetPath = document.getElementById('target-repo').value;
      const model = document.querySelector('input[name="model"]:checked').value;

      try {
        const response = await fetch('/api/dispatch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            slug,
            targetPath,
            prdContent: source === 'paste' ? prdContent : undefined,
            model
          })
        });

        const result = await response.json();
        if (response.ok) {
          alert(`✓ Dispatched: ${result.data.slug} (PID ${result.data.pid})\n✓ Features: ${result.data.featuresGenerated} pending\n✓ Log: ${result.data.logFile}`);
          closeLaunchDrawer();
          // Reset form
          document.getElementById('launch-form').reset();
          document.getElementById('features-preview').style.display = 'none';
          document.getElementById('launch-btn').disabled = true;
        } else {
          alert('Failed to launch: ' + (result.error?.message || 'Unknown error'));
        }
      } catch (error) {
        alert('Error launching job: ' + error.message);
      }
    }

    document.getElementById('launch-job-btn').addEventListener('click', openLaunchDrawer);

    // Load data on page load
    loadPRDs();
    loadRepos();
  </script>
</body>
</html>
